<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>學生作品 Prototype 展示牆</title>
  <meta name="description" content="學生 GitHub Pages 作品統一展示入口，適合課堂發表、期末成果展與作品互評。" />
  <script src="./projects.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #1e293b;
      --primary-2: #334155;
      --accent: #2563eb;
      --good-bg: #ecfdf5;
      --good: #047857;
      --tag-bg: #eef2ff;
      --tag: #3730a3;
      --warn-bg: #fff7ed;
      --warn: #c2410c;
      --shadow: 0 16px 35px rgba(15, 23, 42, 0.10);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.10), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    a {
      color: inherit;
    }

    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 55%, #334155 100%);
      color: white;
      padding: 46px 22px 34px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      right: -120px;
      top: -160px;
    }

    .hero-inner {
      max-width: 1180px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      font-size: 13px;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.15;
      letter-spacing: 1px;
    }

    .hero p {
      max-width: 760px;
      margin: 16px 0 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 16px;
      line-height: 1.8;
    }

    .stats {
      max-width: 1180px;
      margin: -22px auto 0;
      padding: 0 20px;
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .toolbar {
      max-width: 1180px;
      margin: 24px auto 10px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 220px 180px;
      gap: 12px;
      align-items: center;
    }

    .control {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 15px;
      background: white;
      color: var(--text);
      outline: none;
    }

    .control:focus {
      border-color: rgba(37, 99, 235, 0.65);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .notice {
      max-width: 1180px;
      margin: 12px auto 0;
      padding: 0 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .grid {
      max-width: 1180px;
      margin: 0 auto 50px;
      padding: 18px 20px 42px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 22px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .preview-wrap {
      position: relative;
      background: linear-gradient(135deg, #e2e8f0, #f8fafc);
      border-bottom: 1px solid var(--line);
    }

    .preview {
      width: 100%;
      height: 230px;
      border: 0;
      display: block;
      background: white;
    }

    .preview-cover {
      display: none;
      height: 230px;
      align-items: center;
      justify-content: center;
      padding: 22px;
      text-align: center;
      color: var(--muted);
      line-height: 1.8;
    }

    .card-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      font-size: 12px;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--tag);
      line-height: 1.2;
    }

    .badge.status {
      background: var(--good-bg);
      color: var(--good);
    }

    .badge.time {
      background: var(--warn-bg);
      color: var(--warn);
    }

    .student {
      font-size: 15px;
      font-weight: 800;
      color: var(--primary);
    }

    .title-row h2 {
      font-size: 21px;
      margin: 3px 0 0;
      line-height: 1.3;
      color: #0f172a;
    }

    .note {
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
      min-height: 23px;
    }

    .url {
      color: #64748b;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-all;
      padding: 10px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      text-decoration: none;
      padding: 10px 13px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 14px;
      border: 1px solid #cbd5e1;
      color: var(--primary);
      background: white;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.10);
    }

    .btn.primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .empty {
      max-width: 1180px;
      margin: 22px auto 70px;
      padding: 28px 20px;
      color: var(--muted);
      text-align: center;
      display: none;
    }

    footer {
      border-top: 1px solid var(--line);
      color: var(--muted);
      text-align: center;
      padding: 24px 20px 32px;
      font-size: 13px;
      background: rgba(255,255,255,0.65);
    }

    @media (max-width: 820px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 34px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="eyebrow">GitHub Pages Showcase</div>
      <h1>作品 Prototype 展示牆</h1>
      <p>統一展示學生 GitHub Pages 作品，適合課堂發表、成果展示。</p>
    </div>
  </header>

  <section class="stats" aria-label="作品統計">
    <div class="stat-card">
      <div id="totalCount" class="stat-number">0</div>
      <div class="stat-label">作品總數</div>
    </div>
    <div class="stat-card">
      <div id="typeCount" class="stat-number">0</div>
      <div class="stat-label">作品類型</div>
    </div>
    <div class="stat-card">
      <div id="displayCount" class="stat-number">0</div>
      <div class="stat-label">目前顯示</div>
    </div>
  </section>

  <section class="toolbar" aria-label="篩選工具列">
    <input id="searchInput" class="control" placeholder="搜尋學生姓名、作品名稱、類型、網址..." />
    <select id="typeFilter" class="control" aria-label="依作品類型篩選">
      <option value="all">全部類型</option>
    </select>
    <select id="viewMode" class="control" aria-label="預覽模式">
      <option value="iframe">顯示即時預覽</option>
      <option value="simple">只顯示卡片</option>
    </select>
  </section>

  <div class="notice">
    提醒：若某些作品無法在卡片中預覽，通常是對方頁面或瀏覽器限制 iframe；請直接點「開啟作品」。
  </div>

  <main id="grid" class="grid"></main>
  <section id="empty" class="empty">找不到符合條件的作品。</section>

  <footer>
    Student Prototype Gallery｜Powered by GitHub Pages
  </footer>

  <script>
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    const searchInput = document.getElementById("searchInput");
    const typeFilter = document.getElementById("typeFilter");
    const viewMode = document.getElementById("viewMode");
    const totalCount = document.getElementById("totalCount");
    const typeCount = document.getElementById("typeCount");
    const displayCount = document.getElementById("displayCount");

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function buildTypeOptions() {
      const types = [...new Set(projects.map(p => p.type || "未分類"))].sort();
      typeCount.textContent = types.length;
      typeFilter.innerHTML = `<option value="all">全部類型</option>` +
        types.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join("");
    }

    function getFilteredProjects() {
      const keyword = searchInput.value.trim().toLowerCase();
      const selectedType = typeFilter.value;

      return projects.filter(p => {
        const text = [p.name, p.title, p.type, p.status, p.note, p.url]
          .join(" ")
          .toLowerCase();

        const matchKeyword = !keyword || text.includes(keyword);
        const matchType = selectedType === "all" || (p.type || "未分類") === selectedType;
        return matchKeyword && matchType;
      });
    }

    function render() {
      const list = getFilteredProjects();
      const showPreview = viewMode.value === "iframe";

      totalCount.textContent = projects.length;
      displayCount.textContent = list.length;
      empty.style.display = list.length ? "none" : "block";

      grid.innerHTML = list.map((p, index) => {
        const name = escapeHtml(p.name);
        const title = escapeHtml(p.title);
        const type = escapeHtml(p.type || "作品");
        const status = escapeHtml(p.status || "展示中");
        const time = escapeHtml(p.time || `#${index + 1}`);
        const note = escapeHtml(p.note || "");
        const url = escapeHtml(p.url);

        const previewHtml = showPreview
          ? `<iframe class="preview" src="${url}" title="${name} - ${title}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"></iframe>`
          : `<div class="preview-cover">已切換成簡潔模式。<br>請使用下方按鈕開啟作品。</div>`;

        return `
          <article class="card">
            <div class="preview-wrap">
              ${previewHtml}
            </div>
            <div class="card-body">
              <div class="meta">
                <span class="badge">${type}</span>
                <span class="badge status">${status}</span>
                <span class="badge time">${time}</span>
              </div>

              <div class="title-row">
                <div class="student">${name}</div>
                <h2>${title}</h2>
              </div>

              <div class="note">${note}</div>
              <div class="url">${url}</div>

              <div class="actions">
                <a class="btn primary" href="${url}" target="_blank" rel="noopener noreferrer">開啟作品</a>
                <button class="btn" type="button" onclick="copyLink('${url}')">複製連結</button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll(".preview-cover").forEach(el => {
        el.style.display = "flex";
      });
    }

    async function copyLink(url) {
      try {
        await navigator.clipboard.writeText(url);
        alert("已複製作品連結");
      } catch (error) {
        prompt("請手動複製連結", url);
      }
    }

    searchInput.addEventListener("input", render);
    typeFilter.addEventListener("change", render);
    viewMode.addEventListener("change", render);

    buildTypeOptions();
    render();
  </script>
</body>
</html>
